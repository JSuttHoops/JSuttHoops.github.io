<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSuttHoops</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #081f22;
        --muted: #526266;
        --paper: #f7f2e9;
        --line: #d8cdbd;
        --accent: #006a6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, calc(100vw - 32px));
        padding: 48px 0;
      }

      p {
        color: var(--muted);
        font-size: 1.1rem;
        line-height: 1.6;
        margin: 12px 0 0;
      }

      h1 {
        font-size: clamp(2.7rem, 7vw, 5.5rem);
        letter-spacing: 0;
        line-height: 0.95;
        margin: 0;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JSuttHoops</h1>
      <p>Basketball analysis, draft models, and data projects by Jacob Sutton.</p>
      <p><a href="https://github.com/JSuttHoops">GitHub</a></p>
    </main>
  </body>
</html>
